k9s:
  liveViewAutoRefresh: false
  screenDumpDir: /Users/karlcayme/.config/k9s/screen-dumps
  refreshRate: 2
  maxConnRetry: 5
  readOnly: true
  noExitOnCtrlC: false
  ui:
    enableMouse: true
    headless: false
    logoless: false
    crumbsless: false
    reactive: true
    noIcons: true
    defaultsToFullScreen: false
    skin: nord
  skipLatestRevCheck: false
  disablePodCounting: false
  shellPod:
    image: busybox:1.35.0
    namespace: default
    limits:
      cpu: 100m
      memory: 100Mi
  imageScans:
    enable: false
    exclusions:
      namespaces: []
      labels: {}
  logger:
    tail: 5000
    buffer: 5000
    sinceSeconds: 7200 # default 60 — pull last 2h on open
    textWrap: true
    showTime: false
    fullScreen: true
  thresholds:
    cpu:
      critical: 90
      warn: 70
    memory:
      critical: 90
      warn: 70
